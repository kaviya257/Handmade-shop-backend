<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>

    <style>
        body{
            margin:0;
            font-family:'Segoe UI';
            background:linear-gradient(135deg,#ffecd2,#fcb69f);
        }

        .nav{
            background:black;
            padding:15px;
            display:flex;
            justify-content:center;
            gap:20px;
        }

        .nav a{color:white;text-decoration:none;}

        .container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            padding:20px;
        }

        .card{
            background:white;
            width:280px;
            padding:15px;
            border-radius:15px;
        }
        button{
            margin:5px;
            padding:8px;
            border:none;
            border-radius:6px;
        }
        .ship{background:blue;color:white;}
        .deliver{background:green;color:white;}
    </style>
</head>

<body>

<div class="nav">
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="add-product.html">Add</a>
    <a href="manage-products.html">Products</a>
    <a href="view-orders.html">Orders</a>
    <button onclick="logout()">Logout</button>
</div>

<h2 style="text-align:center;">Orders</h2>

<div id="orders" class="container"></div>

<script>

    function loadOrders(){
        fetch("http://localhost:8080/admin/orders")
            .then(r=>r.json())
            .then(data=>{
                let html="";

                data.forEach(o=>{
                    html+=`
<div class="card">

<h3>Order #${o.id}</h3>
<p>User: ${o.username}</p>
<p>Status: ${o.status}</p>
<p>₹${o.totalAmount}</p>

<button class="ship" onclick="update(${o.id},'SHIPPED')">Ship</button>
<button class="deliver" onclick="update(${o.id},'DELIVERED')">Deliver</button>

</div>`;
                });

                document.getElementById("orders").innerHTML=html;
            });
    }
    function logout(){ localStorage.clear(); window.location="../login.html"; }
    function update(id,status){

        fetch("http://localhost:8080/admin/order/"+id+"/status?status="+status,
            {method:"PUT"})
            .then(()=>{

                if(status==="DELIVERED"){
                    fetch("http://localhost:8080/orders/"+id,{method:"DELETE"});
                }

                loadOrders();
            });
    }

    loadOrders();

</script>

</body>
</html>
