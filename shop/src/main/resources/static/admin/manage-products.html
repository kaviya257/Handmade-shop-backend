<!DOCTYPE html>
<html>
<head>
    <title>Manage Products</title>

    <style>
        body{
            margin:0;
            font-family:'Segoe UI';
            background:linear-gradient(135deg,#ffecd2,#fcb69f);
        }

        .nav{
            background:black;
            padding:15px;
            display:flex;
            justify-content:center;
            gap:20px;
        }

        .nav a{color:white;text-decoration:none;}

        .container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            padding:20px;
        }

        .card{
            background:white;
            width:220px;
            padding:15px;
            border-radius:15px;
            text-align:center;
        }

        img{
            width:100%;
            border-radius:10px;
        }
        button{
            background:red;
            color:white;
            border:none;
            padding:5px 10px;
            border-radius:6px;
        }
    </style>
</head>

<body>

<div class="nav">
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="add-product.html">Add</a>
    <a href="manage-products.html">Products</a>
    <a href="view-orders.html">Orders</a>
    <button onclick="logout()">Logout</button>
</div>

<h2 style="text-align:center;">Manage Products</h2>

<div id="list" class="container"></div>

<script>

    function load(){
        fetch("http://localhost:8080/admin/products")
            .then(r=>r.json())
            .then(data=>{
                let html="";

                data.forEach(p=>{
                    html+=`
<div class="card">

<img src="http://localhost:8080${p.image}">

<h3>${p.name}</h3>
<p>₹${p.price}</p>

<button onclick="del(${p.id})">Delete</button>

</div>`;
                });

                document.getElementById("list").innerHTML=html;
            });
    }
    function logout(){ localStorage.clear(); window.location="../login.html"; }
    function del(id){
        fetch("http://localhost:8080/admin/product/"+id,{method:"DELETE"})
            .then(()=>load());
    }

    load();

</script>

</body>
</html>
